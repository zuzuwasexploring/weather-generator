<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather Generator</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap">
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>Weather Generator</h1>
            <p>Create custom weather reports to prank your friends</p>
        </div>

        <div class="main-content">
            <!-- Weather Display -->
            <div class="weather-display">
                <div class="weather-card">
                    <div class="location-header">
                        <div class="location-info">
                            <div class="location-name" id="locationName">San Francisco</div>
                            <div class="location-date" id="locationDate"></div>
                        </div>
                        <input type="text" id="locationInput" class="location-input" placeholder="Enter location">
                    </div>

                    <div class="weather-main">
                        <div class="temp-section">
                            <div class="temp-display" id="tempDisplay">72</div>
                            <div class="temp-unit">°F</div>
                        </div>
                        <div class="icon-section">
                            <svg id="weatherIcon" class="weather-icon" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
                                <!-- Default sunny icon -->
                                <circle cx="50" cy="50" r="28" fill="#FFB84D"/>
                                <g stroke="#FFB84D" stroke-width="3" stroke-linecap="round">
                                    <line x1="50" y1="10" x2="50" y2="22"/>
                                    <line x1="50" y1="78" x2="50" y2="90"/>
                                    <line x1="10" y1="50" x2="22" y2="50"/>
                                    <line x1="78" y1="50" x2="90" y2="50"/>
                                </g>
                            </svg>
                        </div>
                    </div>

                    <div class="weather-description" id="weatherDescription">Sunny</div>

                    <div class="weather-details">
                        <div class="detail-item">
                            <span class="detail-label">Feels like</span>
                            <span class="detail-value" id="feelsLike">72°</span>
                        </div>
                        <div class="detail-item">
                            <span class="detail-label">Humidity</span>
                            <span class="detail-value" id="humidity">45%</span>
                        </div>
                        <div class="detail-item">
                            <span class="detail-label">Wind</span>
                            <span class="detail-value" id="windSpeed">8 mph</span>
                        </div>
                        <div class="detail-item">
                            <span class="detail-label">Pressure</span>
                            <span class="detail-value" id="pressure">30.12 in</span>
                        </div>
                    </div>

                    <!-- Air Quality -->
                    <div class="air-quality-section">
                        <div class="aqi-header">
                            <span class="aqi-label">Air Quality</span>
                            <span class="aqi-value" id="aqiValue">50 · Good</span>
                        </div>
                        <div class="aqi-bar" id="aqiBar"></div>
                    </div>

                    <!-- Warnings Section -->
                    <div class="warnings-section" id="warningsSection" style="display: none;">
                        <div class="warning-header">⚠️ Alerts</div>
                        <div id="warningsContainer" class="warnings-list"></div>
                    </div>
                </div>
            </div>

            <!-- Control Panel -->
            <div class="control-panel">
                <h2>Customize Weather</h2>

                <div class="control-group">
                    <label for="tempInput">Temperature (°F)</label>
                    <div class="input-group">
                        <input type="number" id="tempInput" value="72" min="-100" max="200">
                        <span class="unit">°F</span>
                    </div>
                </div>

                <div class="control-group">
                    <label for="descriptionInput">Weather Description</label>
                    <input type="text" id="descriptionInput" value="Sunny" placeholder="e.g., Sunny, Rainy, Snowy...">
                </div>

                <div class="control-group">
                    <label for="aqiSlider">Air Quality Index (0 - 10,000)</label>
                    <div class="slider-group">
                        <input type="range" id="aqiSlider" min="0" max="10000" value="50" class="slider">
                        <span id="aqiDisplay" class="slider-value">50</span>
                    </div>
                </div>

                <div class="control-group">
                    <label for="humiditySlider">Humidity (%)</label>
                    <div class="input-group">
                        <input type="range" id="humiditySlider" min="0" max="100" value="45" class="slider">
                        <span id="humidityDisplay" class="slider-value">45</span>
                    </div>
                </div>

                <div class="control-group">
                    <label for="windInput">Wind Speed (mph)</label>
                    <div class="input-group">
                        <input type="number" id="windInput" value="8" min="0" max="200">
                        <span class="unit">mph</span>
                    </div>
                </div>

                <div class="control-group">
                    <label for="feelsLikeInput">Feels Like (°F)</label>
                    <div class="input-group">
                        <input type="number" id="feelsLikeInput" value="72" min="-100" max="200">
                        <span class="unit">°F</span>
                    </div>
                </div>

                <div class="control-group">
                    <label for="pressureInput">Pressure (in)</label>
                    <div class="input-group">
                        <input type="number" id="pressureInput" value="30.12" min="28" max="32" step="0.01">
                        <span class="unit">in</span>
                    </div>
                </div>

                <div class="divider"></div>

                <div class="control-group">
                    <label for="warningInput">Add Special Warning</label>
                    <div class="warning-input-group">
                        <input type="text" id="warningInput" placeholder="e.g., Extreme Heat Alert, Tornado Warning...">
                        <button id="addWarningBtn" class="btn-add-warning">Add</button>
                    </div>
                </div>

                <div id="warningsList" class="warnings-list-edit"></div>

                <div class="divider"></div>

                <div class="weather-icons-selector">
                    <label>Weather Icon (14 options)</label>
                    <div class="icons-grid">
                        <!-- Icon 1: Sunny Burst -->
                        <button class="icon-btn" data-icon="sunny-burst" title="Sunny Burst">
                            <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
                                <circle cx="50" cy="50" r="28" fill="#FFB84D"/>
                                <circle cx="50" cy="20" r="8" fill="#FFD700"/>
                                <circle cx="80" cy="50" r="8" fill="#FFD700"/>
                                <circle cx="50" cy="80" r="8" fill="#FFD700"/>
                                <circle cx="20" cy="50" r="8" fill="#FFD700"/>
                                <circle cx="71" cy="29" r="7" fill="#FFD700"/>
                                <circle cx="71" cy="71" r="7" fill="#FFD700"/>
                                <circle cx="29" cy="71" r="7" fill="#FFD700"/>
                                <circle cx="29" cy="29" r="7" fill="#FFD700"/>
                            </svg>
                        </button>

                        <!-- Icon 2: Light Cloud -->
                        <button class="icon-btn" data-icon="light-cloud" title="Light Cloud">
                            <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
                                <path d="M30 65C20 65 15 58 15 48C15 38 22 32 30 32C33 22 40 18 48 18C60 18 70 28 72 42C82 45 88 52 88 62C88 72 82 80 72 80H32C24 80 30 75 30 65Z" fill="#D1D5DB"/>
                            </svg>
                        </button>

                        <!-- Icon 3: Dark Cloud -->
                        <button class="icon-btn" data-icon="dark-cloud" title="Dark Cloud">
                            <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
                                <path d="M30 65C20 65 15 58 15 48C15 38 22 32 30 32C33 22 40 18 48 18C60 18 70 28 72 42C82 45 88 52 88 62C88 72 82 80 72 80H32C24 80 30 75 30 65Z" fill="#6B7280"/>
                            </svg>
                        </button>

                        <!-- Icon 4: Rainy Cloud -->
                        <button class="icon-btn" data-icon="rainy-cloud" title="Rainy Cloud">
                            <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
                                <path d="M25 58C15 58 10 51 10 41C10 31 20 25 28 25C32 15 40 10 48 10C58 10 66 18 68 30C78 33 85 40 85 50C85 60 78 67 68 67H30C22 67 25 65 25 58Z" fill="#4B5563"/>
                                <circle cx="32" cy="78" r="4" fill="#60A5FA"/>
                                <circle cx="52" cy="85" r="4" fill="#60A5FA"/>
                                <circle cx="70" cy="78" r="4" fill="#60A5FA"/>
                            </svg>
                        </button>

                        <!-- Icon 5: Partly Cloudy -->
                        <button class="icon-btn" data-icon="partly-cloudy" title="Partly Cloudy">
                            <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
                                <circle cx="35" cy="35" r="22" fill="#FFB84D"/>
                                <path d="M45 50C35 50 30 45 30 35C30 28 35 22 42 22C45 15 52 12 58 12C68 12 76 20 78 32C85 35 90 41 90 50C90 60 85 68 75 68H48C42 68 45 66 45 56Z" fill="white"/>
                            </svg>
                        </button>

                        <!-- Icon 6: Windy Cloud -->
                        <button class="icon-btn" data-icon="windy-cloud" title="Windy Cloud">
                            <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
                                <path d="M15 45C8 45 5 42 5 37C5 32 10 28 15 28C17 22 22 18 28 18C35 18 41 23 42 32C48 34 52 39 52 45C52 52 48 58 42 58H20C15 58 15 55 15 50Z" fill="#B3D9F2"/>
                                <path d="M30 60C20 60 15 55 15 45C15 35 25 30 33 30C37 20 45 15 53 15C63 15 71 23 73 35C83 38 90 45 90 55C90 65 83 72 73 72H35C27 72 30 70 30 60Z" fill="white"/>
                            </svg>
                        </button>

                        <!-- Icon 7: Heavy Rain -->
                        <button class="icon-btn" data-icon="heavy-rain" title="Heavy Rain">
                            <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
                                <ellipse cx="35" cy="35" rx="18" ry="16" fill="#FFB84D"/>
                                <path d="M25 55C15 55 10 50 10 40C10 30 20 25 28 25C32 15 40 10 48 10C58 10 66 18 68 30C78 33 85 40 85 50C85 60 78 67 68 67H30C22 67 25 65 25 55Z" fill="#4B5563"/>
                                <circle cx="30" cy="75" r="3" fill="#60A5FA"/>
                                <circle cx="48" cy="82" r="3" fill="#60A5FA"/>
                                <circle cx="65" cy="75" r="3" fill="#60A5FA"/>
                                <circle cx="38" cy="85" r="2.5" fill="#60A5FA" opacity="0.7"/>
                                <circle cx="58" cy="88" r="2.5" fill="#60A5FA" opacity="0.7"/>
                            </svg>
                        </button>

                        <!-- Icon 8: Rainy & Windy -->
                        <button class="icon-btn" data-icon="rainy-windy" title="Rainy & Windy">
                            <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
                                <path d="M25 55C15 55 10 50 10 40C10 30 20 25 28 25C32 15 40 10 48 10C58 10 66 18 68 30C78 33 85 40 85 50C85 60 78 67 68 67H30C22 67 25 65 25 55Z" fill="#4B5563"/>
                                <g fill="#60A5FA" transform="translate(-5, 0)">
                                    <ellipse cx="28" cy="75" rx="2" ry="5" transform="rotate(-25 28 75)"/>
                                    <ellipse cx="48" cy="85" rx="2" ry="5" transform="rotate(-25 48 85)"/>
                                    <ellipse cx="68" cy="78" rx="2" ry="5" transform="rotate(-25 68 78)"/>
                                </g>
                                <circle cx="15" cy="45" r="6" fill="#93C5FD" opacity="0.6"/>
                                <circle cx="8" cy="60" r="5" fill="#93C5FD" opacity="0.5"/>
                            </svg>
                        </button>

                        <!-- Icon 9: Cloudy -->
                        <button class="icon-btn" data-icon="cloudy" title="Cloudy">
                            <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
                                <path d="M25 60C15 60 10 55 10 45C10 35 20 30 28 30C32 20 40 15 48 15C58 15 66 23 68 35C78 38 85 45 85 55C85 65 78 72 68 72H30C22 72 25 70 25 60Z" fill="#9CA3AF"/>
                            </svg>
                        </button>

                        <!-- Icon 10: Stormy -->
                        <button class="icon-btn" data-icon="stormy" title="Stormy">
                            <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
                                <path d="M25 55C15 55 10 50 10 40C10 30 20 25 28 25C32 15 40 10 48 10C58 10 66 18 68 30C78 33 85 40 85 50C85 60 78 67 68 67H30C22 67 25 65 25 55Z" fill="#4B5563"/>
                                <circle cx="35" cy="75" r="4" fill="#60A5FA"/>
                                <circle cx="52" cy="80" r="4" fill="#60A5FA"/>
                                <circle cx="68" cy="75" r="4" fill="#60A5FA"/>
                            </svg>
                        </button>

                        <!-- Icon 11: Heavy Thunderstorm -->
                        <button class="icon-btn" data-icon="thunderstorm" title="Heavy Thunderstorm">
                            <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
                                <path d="M25 55C15 55 10 50 10 40C10 30 20 25 28 25C32 15 40 10 48 10C58 10 66 18 68 30C78 33 85 40 85 50C85 60 78 67 68 67H30C22 67 25 65 25 55Z" fill="#2C3E50"/>
                                <polygon points="45,70 50,80 48,80 55,95 52,85 60,85" fill="#FFD700"/>
                                <polygon points="60,75 65,85 63,85 70,100 67,90 75,90" fill="#FFD700"/>
                                <polygon points="30,80 35,90 33,90 40,105 37,95 45,95" fill="#FFD700"/>
                                <polygon points="75,70 80,80 78,80 85,95 82,85 90,85" fill="#FFD700"/>
                            </svg>
                        </button>

                        <!-- Icon 12: Snowy -->
                        <button class="icon-btn" data-icon="snowy" title="Snowy">
                            <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
                                <path d="M25 55C15 55 10 50 10 40C10 30 20 25 28 25C32 15 40 10 48 10C58 10 66 18 68 30C78 33 85 40 85 50C85 60 78 67 68 67H30C22 67 25 65 25 55Z" fill="#D1D5DB"/>
                                <circle cx="35" cy="75" r="5" fill="white"/>
                                <circle cx="52" cy="80" r="5" fill="white"/>
                                <circle cx="68" cy="75" r="5" fill="white"/>
                            </svg>
                        </button>

                        <!-- Icon 13: Foggy -->
                        <button class="icon-btn" data-icon="foggy" title="Foggy">
                            <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
                                <path d="M25 55C15 55 10 50 10 40C10 30 20 25 28 25C32 15 40 10 48 10C58 10 66 18 68 30C78 33 85 40 85 50C85 60 78 67 68 67H30C22 67 25 65 25 55Z" fill="#B0B9C1"/>
                            </svg>
                        </button>

                        <!-- Icon 14: Night Moon Cloud -->
                        <button class="icon-btn" data-icon="night-cloud" title="Night Cloud">
                            <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
                                <path d="M25 50C25 38 33 28 45 28C48 28 50 28 52 29C42 38 35 48 35 60C35 72 42 82 52 91C50 92 48 92 45 92C25 92 15 82 15 65C15 50 22 38 32 32C28 38 25 44 25 50Z" fill="#60A5FA"/>
                                <path d="M50 65C40 65 35 60 35 50C35 40 45 35 53 35C57 25 65 20 73 20C83 20 91 28 93 40C103 43 110 50 110 60C110 70 103 77 93 77H55C47 77 50 75 50 65Z" fill="white"/>
                            </svg>
                        </button>
                    </div>
                </div>

                <button id="resetBtn" class="btn-reset">Reset All</button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
